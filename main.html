<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Meet iPhone</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #fff;
            color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: env(safe-area-inset-top); /* Fits iPhone 14 Pro Dynamic Island */
            height: 100vh;
            overflow: hidden;
        }

        /* Branding */
        .apple-logo-img {
            width: 22px;
            margin-top: 40px;
            margin-bottom: 12px;
        }
        h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin: 0;
        }
        .sub-header {
            font-size: 17px;
            color: #1d1d1f;
            margin-top: 6px;
            margin-bottom: 25px;
        }

        /* Menu Buttons */
        .button-container {
            width: 85%;
            max-width: 320px;
            z-index: 1;
        }
        .btn {
            display: block;
            margin-bottom: 12px;
            padding: 16px;
            border: 1px solid #d2d2d7;
            border-radius: 14px;
            color: #000;
            text-decoration: none;
            font-size: 16px;
            font-weight: 400;
            background: none;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active {
            background-color: #f5f5f7;
        }

        /* Hero Image */
        .hero-image {
            margin-top: 20px;
            width: 100%;
            max-width: 400px;
            object-fit: contain;
        }

        /* Custom iOS Alert Modal */
        #custom-alert {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4); /* Dimmed background */
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .alert-box {
            width: 270px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px); /* Apple's signature blur */
            -webkit-backdrop-filter: blur(20px);
            border-radius: 14px;
            text-align: center;
            animation: fadeIn 0.2s ease-out;
        }
        .alert-content {
            padding: 20px;
        }
        .alert-title {
            font-weight: 600;
            font-size: 17px;
            margin-bottom: 4px;
        }
        .alert-message {
            font-size: 13px;
            line-height: 1.4;
            color: #000;
        }
        .alert-button {
            border-top: 0.5px solid #3f3f3f4d;
            padding: 12px;
            color: #007aff;
            font-weight: 600;
            font-size: 17px;
            text-decoration: none;
            display: block;
            cursor: pointer;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(1.1); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <img src="https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Fi.pinimg.com%2Foriginals%2F8e%2Ff8%2Fe7%2F8ef8e7517ce4e8ba5c30c0e649892441.png&f=1&nofb=1&ipt=e270176932a7172284f1cb06030511ad492059123f2817f3b7815ab98f6d1b67" alt="Apple Logo" class="apple-logo-img">
    
    <h1>iPhone 14 Pro</h1>
    <p class="sub-header">What would you like to do?</p>
    
    <div class="button-container">
        <div class="btn" onclick="showAlert()">Take a closer look</div>
        <div class="btn" onclick="showAlert()">Compare all models</div>
        <div class="btn" onclick="showAlert()">See pricing</div>
    </div>

    <img src="https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Fwww.apple.com%2Fnewsroom%2Fimages%2Fproduct%2Fiphone%2Fstandard%2FApple-iPhone-14-Pro-iPhone-14-Pro-Max-hero-220907_Full-Bleed-Image.jpg.large.jpg&f=1&nofb=1&ipt=5e1305f3bf16e763009893d9ca72125894635b296588a1b1e2e8f977c62e697e" alt="iPhone 14 Pro" class="hero-image">

    <div id="custom-alert">
        <div class="alert-box">
            <div class="alert-content">
                <div class="alert-title">Notice</div>
                <div class="alert-message">This section is currently unavailable. For more information or technical specifications, please contact a team member.</div>
            </div>
            <div class="alert-button" onclick="closeAlert()">OK</div>
        </div>
    </div>

    <script>
        function showAlert() {
            document.getElementById('custom-alert').style.display = 'flex';
        }
        function closeAlert() {
            document.getElementById('custom-alert').style.display = 'none';
        }
    </script>

</body>
</html>
